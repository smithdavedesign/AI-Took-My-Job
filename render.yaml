services:
  - type: web
    name: ai-devops-nexus-web
    env: node
    plan: starter
    region: oregon
    autoDeploy: false
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: true
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-devops-nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-devops-nexus-redis
          property: connectionString
      - key: OPERATOR_UI_USERNAME
        sync: false
      - key: OPERATOR_UI_PASSWORD
        sync: false
      - key: OPERATOR_SESSION_SECRET
        sync: false
      - key: INTERNAL_SERVICE_TOKENS
        sync: false
      - key: GITHUB_AUTH_MODE
        value: app
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_APP_CLIENT_ID
        sync: false
      - key: GITHUB_APP_CLIENT_SECRET
        sync: false
      - key: GITHUB_APP_STATE_SECRET
        sync: false
      - key: PUBLIC_WIDGET_SIGNING_SECRET
        sync: false
      - key: PUBLIC_ROUTE_RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: PUBLIC_ROUTE_RATE_LIMIT_MAX
        value: 120
      - key: PUBLIC_FEEDBACK_RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: PUBLIC_FEEDBACK_RATE_LIMIT_MAX
        value: 20

  - type: worker
    name: ai-devops-nexus-worker
    env: node
    plan: starter
    region: oregon
    autoDeploy: false
    buildCommand: npm ci && npm run build
    startCommand: node dist/worker.js
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-devops-nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-devops-nexus-redis
          property: connectionString
      - key: INTERNAL_SERVICE_TOKENS
        sync: false
      - key: GITHUB_AUTH_MODE
        value: app
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_INSTALLATION_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_APP_CLIENT_ID
        sync: false
      - key: GITHUB_APP_CLIENT_SECRET
        sync: false
      - key: GITHUB_APP_STATE_SECRET
        sync: false
      - key: PUBLIC_WIDGET_SIGNING_SECRET
        sync: false

  - type: keyvalue
    name: ai-devops-nexus-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: ai-devops-nexus-db
    plan: basic-256mb
    ipAllowList: []